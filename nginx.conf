# =============================================================================
# Nginx configuration — task_manager_flutter (Cliente)
# =============================================================================

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_static on;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml application/wasm;
    gzip_min_length 1024;

    # index.html — never cached (always fetch latest version)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long-lived cache (immutable)
    location ~* \.(?:js|css|wasm|png|jpg|jpeg|gif|ico|svg|ttf|woff|woff2|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
