# =============================================================================
# Nginx configuration — task_manager_flutter (Cliente)
# =============================================================================

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_static on;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml application/wasm;
    gzip_min_length 1024;

    # Arquivos de boot de nome FIXO (mudam a cada build, sem hash no nome):
    # devem sempre revalidar, senao o cliente fica preso numa versao antiga.
    # 'no-cache' revalida via ETag/Last-Modified (resposta 304) — nao rebaixa
    # o arquivo se nada mudou, entao nao pesa nos 6+ MB do main.dart.js.
    location ~* ^/(index\.html|flutter_bootstrap\.js|main\.dart\.js|flutter\.js|flutter_service_worker\.js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Manifests e dados JSON (manifest/version/AssetManifest/FontManifest):
    # tambem revalidam — sao pequenos e mudam a cada build.
    location ~* \.json$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Assets versionados (fontes, imagens, css, wasm) — cache longo imutavel.
    location ~* \.(?:css|wasm|png|jpg|jpeg|gif|ico|svg|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — demais rotas servem index.html (sem cache).
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
