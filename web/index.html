<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Abraço Contabilidade">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Abraço Contabilidade</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Evita o flash de fundo rosa durante carregamento do Flutter Web.
       Cor deve corresponder a GridColors.background (#F6FAF7). */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #F6FAF7;
    }
  </style>

</head>
<body>
  <script>
    // LOG DE DIAGNÓSTICO TEMPORÁRIO — marcos de carregamento no console do navegador.
    console.log('[WEB-BOOT] index.html carregado:', new Date().toISOString());
    window.addEventListener('error', function (e) {
      console.error('[WEB-ERROR] erro JS global:', e.message, (e.filename || '') + ':' + (e.lineno || ''));
    });
    window.addEventListener('unhandledrejection', function (e) {
      console.error('[WEB-ERROR] promessa rejeitada sem tratamento:', e.reason);
    });

    // Service worker: força atualização e recarrega quando uma nova versão assume,
    // evitando ficar preso numa versão antiga em cache (causa do "fundo rosa").
    if ('serviceWorker' in navigator) {
      var recarregando = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (recarregando) return;
        recarregando = true;
        console.log('[SW] nova versão ativada — recarregando a página.');
        window.location.reload();
      });
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.update(); });
      }).catch(function () {});
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
