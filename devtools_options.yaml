
trigger:
  branches:
    include:
      - damiao_1.0  # Altere para o nome da sua branch principal

pool:
  vmImage: 'macos-latest'  # Use uma imagem de macOS, pois você precisa para gerar o IPA

steps:

# Passo 1: Preparar o ambiente Flutter
- task: UseFlutter@0
  inputs:
    version: 'latest'  # Ou a versão do Flutter que você está usando

# Passo 2: Restaurar dependências do Flutter
- script: |
    flutter pub get
  displayName: 'Restaurar dependências do Flutter'

# Passo 3: Compilar o APK para Android
- script: |
    flutter build apk --release
  displayName: 'Compilar APK para Android'

# Passo 4: Compilar o IPA para iOS (necessário ter um certificado válido e perfil de provisionamento)
- script: |
    flutter build ios --release --no-codesign
  displayName: 'Compilar IPA para iOS'

# Passo 5: Publicar APK no Google Play (utilizando o Google Play Developer API)
# Passo 5: Publicar APK no Google Play
- task: GooglePlayRelease@4
  inputs:
    serviceEndpoint: 'GooglePlay'          # conexão de serviço criada no DevOps
    action: 'Release'
    appId: 'com.washingtonclimaco.task_manager_flutter'   # <-- APPID CORRETO
    apkFile: 'build/app/outputs/flutter-apk/app-release.apk'
    track: 'production'      # ou 'alpha' / 'beta'

# Passo 6: Publicar IPA na Apple App Store (utilizando o Fastlane)
# - task: UseFastLane@1
#   inputs:
#     fastLaneAction: 'upload_to_app_store'
#     ipaPath: 'build/ios/iphoneos/Runner.ipa'
