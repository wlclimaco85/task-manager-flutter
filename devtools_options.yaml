trigger:
  branches:
    include:
      - damiao_1.0

pool:
  vmImage: "ubuntu-latest"

variables:
  packageName: "com.washingtonclimaco.task_manager_flutter"
  track: "internal"   # internal / alpha / beta / production

steps:

# ---------------------------
# 1. Instalar Flutter
# ---------------------------
- script: |
    git clone https://github.com/flutter/flutter.git -b stable
    echo "##vso[task.prependpath]`pwd`/flutter/bin"
    flutter --version
  displayName: "Instalar Flutter"

# ---------------------------
# 2. Incrementar versionCode
# ---------------------------
- script: |
    echo "### Incrementando versionCode ###"

    GRADLE_FILE="android/app/build.gradle"
    CURRENT=$(grep versionCode $GRADLE_FILE | awk '{print $2}')
    NEXT=$((CURRENT + 1))

    echo "VersionCode atual: $CURRENT"
    echo "Novo VersionCode:  $NEXT"

    sed -i "s/versionCode $CURRENT/versionCode $NEXT/" $GRADLE_FILE

    echo "VersionCode atualizado:"
    grep versionCode $GRADLE_FILE
  displayName: "Incrementar versionCode"

# ---------------------------
# 3. Pub Get
# ---------------------------
- script: flutter pub get
  displayName: "Instalar dependências"

# ---------------------------
# 4. Build APK + AAB
# ---------------------------
- script: |
    flutter build apk --release
    flutter build appbundle --release
  displayName: "Gerar APK + AAB"

# ---------------------------
# 5. Instalar Fastlane
# ---------------------------
- script: |
    sudo gem install fastlane -NV
    fastlane --version
  displayName: "Instalar Fastlane"

# ---------------------------
# 6. Download JSON do Google Play
# ---------------------------
- task: DownloadSecureFile@1
  name: googleJson
  inputs:
    secureFile: google_play.json
  displayName: "Baixar credenciais Google Play"

# ---------------------------
# 7. Publicar no Google Play
# ---------------------------
- script: |
    cd android

    JSON_KEY="$(googleJson.secureFilePath)"
    PACKAGE="$(packageName)"
    CHANGELOG=$(cat ../CHANGELOG.md | head -20)

    AAB="../build/app/outputs/bundle/release/app-release.aab"
    APK="../build/app/outputs/flutter-apk/app-release.apk"

    echo "### Changelog ###"
    echo "$CHANGELOG"

    fastlane supply \
      --json_key "$JSON_KEY" \
      --package_name "$PACKAGE" \
      --track "$(track)" \
      --aab "$AAB" \
      --apk "$APK" \
      --skip_upload_metadata true \
      --skip_upload_images true \
      --skip_upload_screenshots true \
      --skip_upload_changelogs false \
      --changelog "$CHANGELOG"
  displayName: "Publicar no Google Play"
  env:
    FASTLANE_DISABLE_COLORS: "1"