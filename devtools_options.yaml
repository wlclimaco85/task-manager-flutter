#     appleId: 'seu-email@apple.com'  # Substitua com seu ID Apple
#     itcTeamId: 'team_id'  # Seu ID de equipe do Apple Developer
#     appSpecificPassword: $(AppSpecificPassword)  # Crie e armazene a senha específica no Azure DevOps Secrets
